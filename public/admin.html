<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin - Madalina Nails</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
  <h1>Admin - Programări</h1>

  <!-- Bookings Table -->
  <table id="bookings-table"></table>

  <!-- Add New Booking Form -->
  <h2>Adaugă programare nouă</h2>
  <form id="add-booking-form">
    <div class="form-row">
      <label>Data: <input type="date" name="date" required></label>
      <label>Ora: <input type="time" name="time" required></label>
    </div>
    <div class="form-row">
      <label>Nume: <input type="text" name="name" placeholder="Nume" required></label>
      <label>Telefon: <input type="text" name="phone" placeholder="Telefon" required></label>
    </div>
    <div class="form-row">
      <label>Serviciu: <input type="text" name="service" placeholder="Serviciu opțional"></label>
    </div>
    <button type="submit" class="btn">Adaugă programare</button>
  </form>
<button onclick="logout()">Logout</button>

<script>
function logout() {
  window.location.href = "/auth/logout";
}
</script>
</div>

<script src="admin.js"></script>
</body>
</html>
