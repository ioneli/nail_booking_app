<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin - Madalina Nails</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
  <h1>Admin - Programări</h1>

  <!-- Bookings Table -->
  <table id="bookings-table"></table>

  <!-- Add New Booking Form -->
  <h2>Adaugă programare nouă</h2>
  <form id="add-booking-form">
    <div class="form-row">
      <label>Data: <input type="date" name="date" required></label> 
 <label><select id="time" name="time">
  <option value="">Selectează ora</option>
  <option value="08:00">08:00 exceptie</option>
  <option value="10:00">10:00</option>
  <option value="13:00">13:00</option>
  <option value="15:00">15:00</option>
  <option value="17:00">18:00</option>
  <option value="19:00">20:00 exceptie</option>
  <option value="21:00">22:00 exceptie</option>
</select></label>
    </div>

    <div class="form-row">
      <label>Nume: <input type="text" name="name" placeholder="Nume" required></label>
      <label>Telefon: <input type="text" name="phone" placeholder="Telefon"></label>
      <label>email: <input type="text" name="email" placeholder="email"></label>
    </div>
    <div class="form-row">
      <label>Serviciu: <input type="text" name="service" placeholder="Serviciu opțional"></label>
    </div>
    <button type="submit" class="btn glitter-purple">Adaugă programare</button>
  </form>
<button onclick="logout()">Logout</button>

<script>
function logout() {
  window.location.href = "/auth/logout";
}
</script>
</div>

<script src="admin.js"></script>
</body>
</html>
