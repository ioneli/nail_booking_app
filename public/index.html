<!DOCTYPE html>
<html lang="ro">
<head>
  <link rel="icon" type="image/png" sizes="32x32" href="/images/favicon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/images/favicon.ico">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Programări unghii profesionale. Rezervă rapid online.">
  <title>Madalina Nails | Programări Unghii</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="loader" class="loader hidden"></div>
<div class="container">
<!-- programarile -->
<button id="myBookingsBtn" class="glitter-purple">Vezi Programări</button>

<div id="myBookingsModal" class="hidden">
  <input type="email" id="myEmail" placeholder="Email">
  <button id="sendOtpBtn">Trimite cod</button>

  <div id="otpSection" class="hidden">
    <input type="text" id="otpInput" placeholder="OTP">
    <button id="verifyOtpBtn">Verifică</button>
  </div>

  <div id="bookingsList"></div>
<button id="closeBtn">X</button>
</div>
  <!-- Card profil + programare inițial -->
  <div class="card profil-card">
    <img src="images/manichiurista.jpg" class="profil-img" alt="Manichiurista">
    <h2>Madalina Nails</h2>
    <p class="descriere">
      Sunt manichiuristă profesionistă, pasionată de design-uri unice și personalizate.
    </p>

    <div class="buttons-top">
      <button class="btn glitter-purple" id="showCalendarBtn">Programează</button>
    </div>
    <!-- Calendar --><!--  Calendar Container -->
<div id="calendar-container" class="hidden">

  <!-- Header -->
  <div class="calendar-top glitter-purple">
    <button  id="prevMonth">‹</button>
    <label id="monthTitle"></label>   
    <button id="nextMonth">›</button>
  </div>

  <!-- Weekdays -->
  <div class="calendar-header">
    <div>L</div>
    <div>M</div>
    <div>M</div>
    <div>J</div>
    <div>V</div>
    <div>S</div>
    <div>D</div>
  </div>

  <!-- Days -->
  <div id="calendar" class="calendar"></div>

</div>
    <!-- Modal pentru booking -->
    <div id="modal" class="modal hidden">
      <div class="modal-content">

        <h3 id="selected-date"></h3>

        <select id="time">
          <option value="">Selectează ora</option>
        </select>

        <input id="name" placeholder="Nume" autocomplete="name">
        <input id="phone" placeholder="Telefon" autocomplete="tel">
        <input id="email" placeHolder="Email" autocomplete="email">
        <label>Stiu ce vreau!
          <input type="checkbox" id="showServices"> 
        </label>

        <div id="services-select" class="hidden">
          <div id="services"></div>
        </div>

        <button class="btn" id="initBookingBtn">Trimite cod</button>

        <div id="otp-section" class="hidden">
          <input id="otp" placeholder="Cod Email (verifica si spam)" autocomplete="one-time-code">
          <button class="btn confirm" id="confirmBookingBtn">Confirmă</button>
        </div>
        
      </div>
    </div>
    <!--swiper-->
    <div id="swiper_box">
   
    <!--colection/products-->
      <button class="btn glitter-purple" id="viewCollectionsBtn">Colecții:</button>
       <div id="zaCollection"></div>
   <div class="swiper" id="swiper">
  <div class="swiper-track">
    <div class="slide"><img src="images/nailss/balerina.jpg" /></div>
    <div class="slide"><img src="images/nailss/patrat.jpg" /></div>
    <div class="slide"><img src="images/nailss/stiletto.jpg" /></div>
    <div class="slide"><img src="images/nailss/oval.jpg" /></div>
  </div>

  <button class="nav prev">‹</button>
  <button class="nav next">›</button>

  <div class="pagination"></div>

</div>
</div>

  </div>
</div>

<div id="toast" class="toast"></div>
<script type="module" src="script.js"></script>
</body>
</html>
