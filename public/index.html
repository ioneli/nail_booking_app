<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Programări unghii profesionale. Rezervă rapid online.">
  <title>Madalina Nails | Programări Unghii</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="loader" class="loader hidden"></div>
<div class="container">

  <!-- Card profil + programare inițial -->
  <div class="card profil-card">
    <img src="images/manichiurista.jpg" class="profil-img" alt="Manichiurista">
    <h2>Madalina Nails</h2>
    <p class="descriere">
      Sunt manichiuristă profesionistă, pasionată de design-uri unice și personalizate.
    </p>

    <div class="buttons-top">
      <button class="btn" id="showCalendarBtn">Programează</button>
      <button class="btn" id="viewCollectionsBtn">Vezi colecții & servicii</button>
    </div>

    <!-- Calendar --><!-- 📅 Calendar Container -->
<div id="calendar-container" class="hidden">

  <!-- Header -->
  <div class="calendar-top">
    <button id="prevMonth">←</button>
    <h3 id="monthTitle"></h3>
    <button id="nextMonth">→</button>
  </div>

  <!-- Weekdays -->
  <div class="calendar-header">
    <div>L</div>
    <div>M</div>
    <div>M</div>
    <div>J</div>
    <div>V</div>
    <div>S</div>
    <div>D</div>
  </div>

  <!-- Days -->
  <div id="calendar" class="calendar"></div>

</div>
    <!-- Modal pentru booking -->
    <div id="modal" class="modal hidden">
      <div class="modal-content">

        <h3 id="selected-date"></h3>

        <select id="time">
          <option value="">Selectează ora</option>
        </select>

        <input id="name" placeholder="Nume" autocomplete="name">
        <input id="phone" placeholder="Telefon" autocomplete="tel">

        <label>
          <input type="checkbox" id="showServices"> Vreau să selectez serviciul
        </label>

        <div id="services-select" class="hidden">
          <div id="services"></div>
        </div>

        <button class="btn" id="initBookingBtn">Trimite cod</button>

        <div id="otp-section" class="hidden">
          <input id="otp" placeholder="Cod SMS" autocomplete="one-time-code">
          <button class="btn confirm" id="confirmBookingBtn">Confirmă</button>
        </div>

      </div>
    </div>
  </div>
</div>

<div id="toast" class="toast"></div>
<script type="module" src="script.js"></script>
</body>
</html>
